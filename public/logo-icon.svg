  />

  <g transform="translate(15, 15) scale(0.7)">
    <circle
      cx="50"
      cy="50"
      r="34"
      fill="none"
      stroke="#0f172a"
      stroke-width="7"
      pathLength="100"
      stroke-dasharray="21 4"
      stroke-dashoffset="23"
      mask="url(#arrow-mask-app)"
      stroke-linecap="butt"
    />
    <path
      d="M 50 24 L 68 54 L 54 48 L 50 98 L 46 48 L 32 54 Z"
      fill="#80c4e9"
      transform="rotate(45, 50, 50)"
